                                - link [ref=e1092] [cursor=pointer]:
                                  - /url: https://www.linkedin.com/feed/update/urn:li:activity:7435109714608295936/?originTrackingId=IzcMAiRjWxCzKUe57%2FpEXQ%3D%3D
                                  - paragraph [ref=e1093]:
                                    - generic [ref=e1094]:
                                      - text: If you’re like me, you’re probably moving from ChatGPT to Claude – for reasons...
                                      - text: Sharing a helpful tip that has made a big difference for my team and me.
                                      - text: It takes maybe 20–30 minutes to set up, but the improvement in AI output is significant.
                                      - text: Unlike ChatGPT, which can sometimes remember details from prior conversations, Claude generally treats each interaction more independently.
                                      - text: That means if we want Claude to produce high-quality outputs consistently, you need to give it structured context about our role, our work, and the problems you’re solving.
                                      - text: As you know, every time you start using a new AI, you’re basically starting from zero.
                                      - text: "It doesn’t know:"
                                      - text: • who you are
                                      - text: • what company you work for
                                      - text: • your product or market
                                      - text: • your strategic priorities
                                      - text: • how you communicate
                                      - text: • who your audience is
                                      - text: So if you just start prompting, the output often sounds generic. That’s why many people still see AI mostly as a tool for quick drafts or summaries.
                                      - text: What I’ve found works much better is creating a small set of Markdown (.md) context files that you can give the AI at the start of a conversation.
                                      - text: Think of them as a briefing packet for the AI.
                                      - text: "These files provide structured context about things like:"
                                      - text: • your role and responsibilities
                                      - text: • your company and market
                                      - text: • your communication style
                                      - text: • your target audiences (internal and external)
                                      - text: • your strategic priorities
                                      - text: • the types of problems you typically work on
                                      - text: Once the AI understands those things, the quality of the output changes dramatically.
                                      - text: It stops acting like a generic chatbot and starts behaving more like a thinking partner.
                                      - text: "It can still help with execution - writing, editing, summarizing - but it also becomes much more useful for:"
                                      - text: • strategy development
                                      - text: • interrogating assumptions
                                      - text: • pressure-testing ideas
                                      - text: • synthesizing information
                                      - text: • even acting as a kind of digital twin to challenge your thinking
                                      - text: "If you want to try this, a simple way to start is creating just a few .md files:"
